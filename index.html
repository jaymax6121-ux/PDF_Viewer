<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Karla:wght@300;400;500;600&display=swap');

:root {
  --bg:#f5f2ee; --surface:#ffffff; --card:#faf9f7; --border:#e8e2d9;
  --accent:#2d4a3e; --accent2:#4a7c65; --accent3:#c8a96e;
  --text:#1a1a18; --muted:#8a8578;
  --red:#c0392b; --red-bg:#fdf2f0;
  --green:#2d7a4a; --green-bg:#f0faf4;
  --shadow:0 2px 20px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#admin-view{display:block;}
#sign-view{display:none;}

/* HEADER */
header{background:var(--accent);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
header h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:#fff;letter-spacing:0.02em;}
header h1 span{color:var(--accent3);}
#sync-status{font-size:0.78rem;color:rgba(255,255,255,0.6);flex:1;text-align:center;}
.btn-upload{background:var(--accent3);color:var(--accent);border:none;padding:10px 22px;border-radius:8px;font-family:'Karla',sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;transition:all 0.2s;letter-spacing:0.03em;}
.btn-upload:hover{background:#d4b87a;transform:translateY(-1px);}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:32px 20px;}

/* STATS */
.stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;flex:1;min-width:120px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent3);}
.stat .num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent);}
.stat .lbl{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:20px;font-family:'Karla',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.search-box{margin-left:auto;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-family:'Karla',sans-serif;font-size:0.82rem;outline:none;width:200px;transition:border-color 0.2s;}
.search-box:focus{border-color:var(--accent2);}

/* CARDS */
.invoices{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:transform 0.2s,box-shadow 0.2s;}
.inv-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.inv-top{background:var(--accent);padding:14px 18px;display:flex;align-items:center;gap:12px;}
.inv-icon{font-size:1.4rem;}
.inv-name{flex:1;font-weight:600;font-size:0.88rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dept-badge{font-size:0.7rem;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:0.04em;white-space:nowrap;}
.dept-IT{background:#1a3a5c;color:#7eb8f7;}
.dept-Marketing{background:#3a1a1a;color:#f77e7e;}
.dept-HR{background:#1a3a2a;color:#7ef7a8;}
.inv-body{padding:14px 18px;}
.inv-meta{font-size:0.78rem;color:var(--muted);margin-bottom:10px;}
.inv-meta span{margin-right:14px;}
.signed-box{background:var(--green-bg);border:1px solid #b8e8cc;border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.signed-box .sl{font-size:0.7rem;color:var(--green);text-transform:uppercase;letter-spacing:0.07em;font-weight:600;}
.signed-box .sn{font-size:0.88rem;font-weight:600;color:var(--accent);margin-top:2px;}
.signed-box .sd{font-size:0.75rem;color:var(--muted);}
.sig-img{max-width:100%;height:38px;object-fit:contain;margin-top:6px;border-radius:4px;background:#fff;padding:2px;}
.unsigned-box{background:#fef9f0;border:1px solid #f0deb0;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:0.82rem;color:#b07820;}
.inv-actions{display:flex;gap:8px;padding:0 18px 14px;}
.btn-view{flex:1;background:var(--card);border:1px solid var(--border);color:var(--accent);padding:8px;border-radius:7px;font-family:'Karla',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-view:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-copy{flex:1;background:var(--accent3);border:none;color:var(--accent);padding:8px;border-radius:7px;font-family:'Karla',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-copy:hover{background:#d4b87a;}
.btn-del{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 10px;border-radius:7px;cursor:pointer;font-size:0.82rem;transition:all 0.15s;}
.btn-del:hover{border-color:var(--red);color:var(--red);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
.empty .icon{font-size:3rem;margin-bottom:14px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent);margin-bottom:20px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:0.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-weight:600;}
.fg input[type=text],.fg select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:'Karla',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.fg input:focus,.fg select:focus{border-color:var(--accent2);}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent2);background:#f0f7f4;}
.uz-icon{font-size:2rem;margin-bottom:8px;}
.uz-text{font-size:0.85rem;color:var(--muted);}
.uz-file{font-size:0.85rem;color:var(--accent2);font-weight:600;margin-top:6px;}
.modal-btns{display:flex;gap:10px;margin-top:22px;}
.modal-cancel{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Karla',sans-serif;font-size:0.9rem;cursor:pointer;}
.modal-cancel:hover{border-color:var(--text);color:var(--text);}
.modal-submit{flex:2;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'Karla',sans-serif;font-weight:600;font-size:0.9rem;cursor:pointer;}
.modal-submit:hover{background:var(--accent2);}
.modal-submit:disabled{opacity:0.6;cursor:not-allowed;}

/* ERRORS */
.ferr{font-size:0.75rem;color:var(--red);margin-top:5px;display:none;}
.ferr.show{display:block;}

/* SIGN VIEW */
#sign-view{min-height:100vh;background:var(--bg);}
.sign-hdr{background:var(--accent);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
.sign-hdr-left h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;}
.sign-hdr-left .dept{font-size:0.8rem;color:rgba(255,255,255,0.6);margin-top:2px;}
.btn-back{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 16px;border-radius:7px;font-family:'Karla',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.btn-back:hover{background:rgba(255,255,255,0.25);}
.sign-body{max-width:960px;margin:0 auto;padding:24px 20px;display:flex;gap:24px;flex-wrap:wrap;}
.pdf-panel{flex:2;min-width:280px;background:var(--surface);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.pdf-panel iframe{width:100%;height:600px;border:none;display:block;}
.pdf-fallback{padding:60px 30px;text-align:center;color:var(--muted);}
.sign-panel{flex:1;min-width:260px;}
.sign-card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px;}
.sign-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--accent);margin-bottom:14px;}
.sign-inp{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:'Karla',sans-serif;font-size:0.9rem;outline:none;margin-bottom:14px;transition:border-color 0.2s;}
.sign-inp:focus{border-color:var(--accent2);}
.sig-wrap{border:2px solid var(--border);border-radius:8px;background:#fff;margin-bottom:10px;}
canvas{display:block;width:100%;touch-action:none;cursor:crosshair;}
.canvas-hint{font-size:0.72rem;color:var(--muted);text-align:center;padding:5px;border-top:1px solid var(--border);}
.btn-clear{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-family:'Karla',sans-serif;font-size:0.8rem;cursor:pointer;margin-bottom:14px;transition:all 0.15s;}
.btn-clear:hover{border-color:var(--red);color:var(--red);}
.btn-sign{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'Karla',sans-serif;font-weight:600;font-size:0.95rem;cursor:pointer;transition:background 0.2s;}
.btn-sign:hover{background:var(--accent2);}
.btn-sign:disabled{opacity:0.6;cursor:not-allowed;}
.already-signed{background:var(--green-bg);border:1px solid #b8e8cc;border-radius:12px;padding:24px;text-align:center;}
.already-signed .chk{font-size:2.5rem;margin-bottom:10px;}
.already-signed h3{font-family:'Playfair Display',serif;color:var(--green);margin-bottom:6px;}
.already-signed p{font-size:0.85rem;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 22px;border-radius:10px;font-size:0.85rem;font-family:'Karla',sans-serif;z-index:999;transition:transform 0.3s,opacity 0.3s;opacity:0;pointer-events:none;max-width:90vw;text-align:center;}
.toast.error{background:var(--red-bg);border:1px solid #e8b0a8;color:var(--red);}
.toast.success{background:var(--green-bg);border:1px solid #b8e8cc;color:var(--green);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ADMIN VIEW -->
<div id="admin-view">
  <header>
    <h1>📄 Invoice <span>Tracker</span></h1>
    <span id="sync-status"></span>
    <button class="btn-upload" onclick="openUploadModal()">+ Upload Invoice</button>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Total Invoices</div></div>
      <div class="stat"><div class="num" id="stat-signed">0</div><div class="lbl">Signed</div></div>
      <div class="stat"><div class="num" id="stat-pending">0</div><div class="lbl">Awaiting Signature</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('IT',this)">IT</button>
      <button class="filter-btn" onclick="setFilter('Marketing',this)">Marketing</button>
      <button class="filter-btn" onclick="setFilter('HR',this)">HR</button>
      <button class="filter-btn" onclick="setFilter('unsigned',this)">⏳ Unsigned</button>
      <button class="filter-btn" onclick="setFilter('signed',this)">✅ Signed</button>
      <input type="text" class="search-box" id="search-box" placeholder="🔍 Search…" oninput="renderInvoices()">
    </div>
    <div class="invoices" id="inv-container">
      <div class="empty" id="empty-state">
        <div class="icon">📁</div>
        <p>No invoices yet. Hit <strong>+ Upload Invoice</strong> to get started.</p>
      </div>
    </div>
  </main>
</div>

<!-- UPLOAD MODAL -->
<div class="overlay" id="upload-modal">
  <div class="modal">
    <h2>Upload Invoice</h2>
    <div class="fg">
      <label>Invoice Name</label>
      <input type="text" id="inv-name" placeholder="e.g. Invoice #1042 — April 2026">
      <div class="ferr" id="err-name"></div>
    </div>
    <div class="fg">
      <label>Department</label>
      <select id="inv-dept">
        <option value="">— Select department —</option>
        <option value="IT">IT</option>
        <option value="Marketing">Marketing</option>
        <option value="HR">HR</option>
      </select>
      <div class="ferr" id="err-dept"></div>
    </div>
    <div class="fg">
      <label>Uploaded By</label>
      <input type="text" id="inv-uploader" placeholder="Your name">
      <div class="ferr" id="err-uploader"></div>
    </div>
    <div class="fg">
      <label>PDF File</label>
      <div class="upload-zone" id="upload-zone"
        onclick="document.getElementById('file-inp').click()"
        ondragover="onDragOver(event)" ondrop="onDrop(event)">
        <div class="uz-icon">📎</div>
        <div class="uz-text">Click to browse or drag & drop PDF here</div>
        <div class="uz-file" id="uz-file"></div>
      </div>
      <input type="file" id="file-inp" accept=".pdf" style="display:none" onchange="onFileSelect(this)">
      <div class="ferr" id="err-file"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeUploadModal()">Cancel</button>
      <button class="modal-submit" id="submit-btn" onclick="submitUpload()">Upload & Generate Link</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- SIGN VIEW -->
<div id="sign-view">
  <div class="sign-hdr">
    <div class="sign-hdr-left">
      <h1 id="sv-title">Invoice</h1>
      <div class="dept" id="sv-dept"></div>
    </div>
    <button class="btn-back" onclick="closeSignView()">← Back</button>
  </div>
  <div class="sign-body">
    <div class="pdf-panel" id="pdf-panel"></div>
    <div class="sign-panel">
      <div id="sign-form-wrap">
        <div class="sign-card">
          <h3>Sign Off</h3>
          <input type="text" class="sign-inp" id="signer-name" placeholder="Your full name">
          <div class="ferr" id="err-signer"></div>
          <div style="font-size:0.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:8px;">Draw your signature</div>
          <div class="sig-wrap">
            <canvas id="sig-canvas" width="300" height="120"></canvas>
            <div class="canvas-hint">Sign with mouse or finger</div>
          </div>
          <div class="ferr" id="err-sig"></div>
          <button class="btn-clear" onclick="clearSig()">✕ Clear</button>
          <button class="btn-sign" id="sign-btn" onclick="submitSignature()">✅ Submit Sign-Off</button>
        </div>
      </div>
      <div id="signed-wrap" style="display:none">
        <div class="already-signed">
          <div class="chk">✅</div>
          <h3>Already Signed</h3>
          <p id="signed-by-txt"></p>
          <p id="signed-date-txt" style="margin-top:4px;"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxgRM1pr6jEoUzIdfOO-q7v35hMvAHd_esW5VY2xVU7XpGm60R_X9QLVh2KZYB4Ywfb/exec';
var BASE_URL  = window.location.origin + window.location.pathname;
var invoices  = [];
var selPDF    = null;
var curFilter = 'all';
var curId     = null;
var toastTmr  = null;
var sigCanvas, sigCtx, sigDrawing = false;

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'error') + ' show';
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
function syncStatus(s) {
  var el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = s === 'syncing' ? '🔄 Syncing…' : s === 'saved' ? '✅ Saved' : '⚠️ Sync issue';
  if (s === 'saved') setTimeout(function(){ el.textContent=''; }, 2500);
}

// ── FIELD ERRORS ──────────────────────────────────────────────────────────────
function showErr(id, msg) { var e=document.getElementById(id); if(e){e.textContent='⚠ '+msg;e.classList.add('show');} }
function clearErr(id)     { var e=document.getElementById(id); if(e){e.textContent='';e.classList.remove('show');} }
function escHtml(s)       { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadInvoices() {
  syncStatus('syncing');
  fetch(SHEET_URL)
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d.invoices){ invoices=d.invoices; renderInvoices(); } syncStatus('saved'); })
    .catch(function(){ syncStatus('error'); });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderInvoices() {
  var con    = document.getElementById('inv-container');
  var empty  = document.getElementById('empty-state');
  var search = (document.getElementById('search-box').value||'').toLowerCase();
  var filt   = invoices.filter(function(inv){
    var mf = curFilter==='all'?true:curFilter==='signed'?inv.signed==='Yes':curFilter==='unsigned'?inv.signed!=='Yes':inv.department===curFilter;
    var ms = !search||inv.fileName.toLowerCase().includes(search)||inv.department.toLowerCase().includes(search)||inv.uploadedBy.toLowerCase().includes(search);
    return mf && ms;
  });
  document.getElementById('stat-total').textContent   = invoices.length;
  document.getElementById('stat-signed').textContent  = invoices.filter(function(i){ return i.signed==='Yes'; }).length;
  document.getElementById('stat-pending').textContent = invoices.filter(function(i){ return i.signed!=='Yes'; }).length;
  con.querySelectorAll('.inv-card').forEach(function(c){ c.remove(); });
  if(filt.length===0){ empty.style.display=''; return; }
  empty.style.display = 'none';
  filt.slice().reverse().forEach(function(inv){ con.appendChild(buildCard(inv)); });
}

function buildCard(inv) {
  var link = BASE_URL + '?id=' + inv.id;
  var card = document.createElement('div');
  card.className = 'inv-card';
  var signedHtml = inv.signed==='Yes'
    ? '<div class="signed-box"><div class="sl">✅ Signed</div><div class="sn">'+escHtml(inv.signedBy)+'</div><div class="sd">'+escHtml(inv.signDate)+'</div>'+(inv.signature?'<img class="sig-img" src="'+inv.signature+'" alt="sig">':'')+'</div>'
    : '<div class="unsigned-box">⏳ Awaiting signature from '+escHtml(inv.department)+'</div>';
  card.innerHTML =
    '<div class="inv-top"><span class="inv-icon">📄</span><span class="inv-name">'+escHtml(inv.fileName)+'</span><span class="dept-badge dept-'+escHtml(inv.department)+'">'+escHtml(inv.department)+'</span></div>'+
    '<div class="inv-body"><div class="inv-meta"><span>📅 '+escHtml(inv.uploadDate)+'</span><span>👤 '+escHtml(inv.uploadedBy)+'</span></div>'+signedHtml+'</div>'+
    '<div class="inv-actions">'+
      '<button class="btn-view" onclick="viewInvoice(\''+inv.id+'\')">👁 View</button>'+
      '<button class="btn-copy" onclick="copyLink(\''+link+'\',this)">🔗 Copy Link</button>'+
      '<button class="btn-del" onclick="delInvoice(\''+inv.id+'\')">🗑</button>'+
    '</div>';
  return card;
}

function setFilter(f, el) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  renderInvoices();
}

function copyLink(link, btn) {
  navigator.clipboard.writeText(link)
    .then(function(){ btn.textContent='✅ Copied!'; setTimeout(function(){ btn.textContent='🔗 Copy Link'; },2000); toast('✅ Link copied!','success'); })
    .catch(function(){ toast('⚠ Copy failed — link: '+link,'error'); });
}

function viewInvoice(id) {
  var inv = invoices.filter(function(i){ return i.id===id; })[0];
  if(inv) openSignView(inv);
}

function delInvoice(id) {
  if(!confirm('Delete this invoice?')) return;
  invoices = invoices.filter(function(i){ return i.id!==id; });
  renderInvoices();
  toast('Deleted locally. Reload to re-sync.','error');
}

// ── UPLOAD MODAL ──────────────────────────────────────────────────────────────
function openUploadModal() {
  selPDF = null;
  ['inv-name','inv-uploader'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('inv-dept').value = '';
  document.getElementById('uz-file').textContent = '';
  document.getElementById('file-inp').value = '';
  ['err-name','err-dept','err-uploader','err-file'].forEach(clearErr);
  document.getElementById('upload-modal').classList.add('open');
}
function closeUploadModal() { document.getElementById('upload-modal').classList.remove('open'); }

function onFileSelect(inp) {
  var file = inp.files[0]; if(!file) return;
  if(file.type!=='application/pdf'){ showErr('err-file','Only PDF files are allowed.'); return; }
  if(file.size>5*1024*1024){ showErr('err-file','File too large. Max 5MB.'); return; }
  var r = new FileReader();
  r.onload = function(e){ selPDF={name:file.name,base64:e.target.result}; document.getElementById('uz-file').textContent='✅ '+file.name; clearErr('err-file'); };
  r.readAsDataURL(file);
}
function onDragOver(e){ e.preventDefault(); document.getElementById('upload-zone').classList.add('dragover'); }
function onDrop(e){
  e.preventDefault(); document.getElementById('upload-zone').classList.remove('dragover');
  var file=e.dataTransfer.files[0]; if(!file) return;
  try{ var dt=new DataTransfer(); dt.items.add(file); document.getElementById('file-inp').files=dt.files; } catch(ex){}
  onFileSelect(document.getElementById('file-inp'));
}

function submitUpload() {
  var name     = document.getElementById('inv-name').value.trim();
  var dept     = document.getElementById('inv-dept').value;
  var uploader = document.getElementById('inv-uploader').value.trim();
  var valid    = true;
  ['err-name','err-dept','err-uploader','err-file'].forEach(clearErr);
  if(!name)     { showErr('err-name',     'Please enter an invoice name.');  valid=false; }
  if(!dept)     { showErr('err-dept',     'Please select a department.');    valid=false; }
  if(!uploader) { showErr('err-uploader', 'Please enter your name.');        valid=false; }
  if(!selPDF)   { showErr('err-file',     'Please select a PDF file.');      valid=false; }
  if(!valid) return;

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Uploading…';

  var id    = 'inv-' + Date.now();
  var today = new Date().toLocaleDateString('en-US');
  var payload = { action:'saveInvoice', id:id, fileName:name, department:dept, uploadedBy:uploader, uploadDate:today, pdfData:selPDF.base64 };

  fetch(SHEET_URL, { method:'POST', body:JSON.stringify(payload), headers:{'Content-Type':'text/plain'} })
    .then(function(r){ return r.json(); })
    .then(function(d){
      btn.disabled=false; btn.textContent='Upload & Generate Link';
      if(d.status==='ok'){
        invoices.push({ id:id, fileName:name, department:dept, uploadedBy:uploader, uploadDate:today, pdfData:selPDF.base64, signed:'No', signedBy:'', signature:'', signDate:'' });
        closeUploadModal(); renderInvoices();
        var link = BASE_URL+'?id='+id;
        navigator.clipboard.writeText(link).catch(function(){});
        toast('✅ Uploaded! Share link copied to clipboard.','success');
      } else { toast('⚠ Upload failed — '+(d.message||'try again'),'error'); }
    })
    .catch(function(){ btn.disabled=false; btn.textContent='Upload & Generate Link'; toast('⚠ Network error.','error'); });
}

// ── SIGN VIEW ─────────────────────────────────────────────────────────────────
function openSignView(inv) {
  curId = inv.id;
  document.getElementById('admin-view').style.display = 'none';
  document.getElementById('sign-view').style.display  = 'block';
  document.getElementById('sv-title').textContent = inv.fileName;
  document.getElementById('sv-dept').textContent  = inv.department + ' Department';

  var panel = document.getElementById('pdf-panel');
  panel.innerHTML = '';
  if(inv.pdfData){
    var iframe = document.createElement('iframe');
    iframe.src = inv.pdfData;
    iframe.style.cssText = 'width:100%;height:600px;border:none;display:block;';
    panel.appendChild(iframe);
  } else {
    panel.innerHTML = '<div class="pdf-fallback"><div style="font-size:2rem">📄</div><p>PDF not available</p></div>';
  }

  if(inv.signed==='Yes'){
    document.getElementById('sign-form-wrap').style.display = 'none';
    document.getElementById('signed-wrap').style.display    = 'block';
    document.getElementById('signed-by-txt').textContent   = 'Signed by ' + inv.signedBy;
    document.getElementById('signed-date-txt').textContent = 'on ' + inv.signDate;
  } else {
    document.getElementById('sign-form-wrap').style.display = 'block';
    document.getElementById('signed-wrap').style.display    = 'none';
    document.getElementById('signer-name').value = '';
    ['err-signer','err-sig'].forEach(clearErr);
    clearSig();
  }
  window.scrollTo(0,0);
}

function closeSignView() {
  document.getElementById('sign-view').style.display  = 'none';
  document.getElementById('admin-view').style.display = 'block';
  history.pushState({}, '', BASE_URL);
}

// ── CANVAS SIGNATURE ──────────────────────────────────────────────────────────
function initCanvas() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx    = sigCanvas.getContext('2d');
  sigCtx.strokeStyle = '#1a1a18';
  sigCtx.lineWidth   = 2.5;
  sigCtx.lineCap     = 'round';
  sigCtx.lineJoin    = 'round';

  function pos(e){
    var r=sigCanvas.getBoundingClientRect(), sx=sigCanvas.width/r.width, sy=sigCanvas.height/r.height;
    var src=e.touches?e.touches[0]:e;
    return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  }
  sigCanvas.addEventListener('mousedown',  function(e){ sigDrawing=true; var p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); });
  sigCanvas.addEventListener('mousemove',  function(e){ if(!sigDrawing) return; var p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); });
  sigCanvas.addEventListener('mouseup',    function(){ sigDrawing=false; });
  sigCanvas.addEventListener('mouseleave', function(){ sigDrawing=false; });
  sigCanvas.addEventListener('touchstart', function(e){ e.preventDefault(); sigDrawing=true; var p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); },{passive:false});
  sigCanvas.addEventListener('touchmove',  function(e){ e.preventDefault(); if(!sigDrawing) return; var p=pos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); },{passive:false});
  sigCanvas.addEventListener('touchend',   function(){ sigDrawing=false; });
}

function clearSig(){ if(sigCtx) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); }

function sigEmpty(){
  if(!sigCanvas) return true;
  var d=sigCtx.getImageData(0,0,sigCanvas.width,sigCanvas.height).data;
  for(var i=3;i<d.length;i+=4){ if(d[i]>0) return false; }
  return true;
}

function submitSignature() {
  var name  = document.getElementById('signer-name').value.trim();
  var valid = true;
  ['err-signer','err-sig'].forEach(clearErr);
  if(!name)      { showErr('err-signer','Please enter your full name.');       valid=false; }
  if(sigEmpty()) { showErr('err-sig',   'Please draw your signature above.'); valid=false; }
  if(!valid) return;

  var sigData  = sigCanvas.toDataURL('image/png');
  var signDate = new Date().toLocaleDateString('en-US') + ' ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  var payload  = { action:'saveSignature', id:curId, signedBy:name, signature:sigData, signDate:signDate };

  var btn = document.getElementById('sign-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Submitting…';

  fetch(SHEET_URL, { method:'POST', body:JSON.stringify(payload), headers:{'Content-Type':'text/plain'} })
    .then(function(r){ return r.json(); })
    .then(function(d){
      btn.disabled=false; btn.textContent='✅ Submit Sign-Off';
      if(d.status==='ok'){
        var inv=invoices.filter(function(i){ return i.id===curId; })[0];
        if(inv){ inv.signed='Yes'; inv.signedBy=name; inv.signature=sigData; inv.signDate=signDate; }
        document.getElementById('sign-form-wrap').style.display='none';
        document.getElementById('signed-wrap').style.display='block';
        document.getElementById('signed-by-txt').textContent='Signed by '+name;
        document.getElementById('signed-date-txt').textContent='on '+signDate;
        toast('✅ Signed successfully!','success');
      } else { toast('⚠ Could not save — try again.','error'); }
    })
    .catch(function(){ btn.disabled=false; btn.textContent='✅ Submit Sign-Off'; toast('⚠ Network error.','error'); });
}

// ── ROUTE ─────────────────────────────────────────────────────────────────────
function checkRoute() {
  var id = new URLSearchParams(window.location.search).get('id');
  if(id){
    syncStatus('syncing');
    fetch(SHEET_URL)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.invoices){ invoices=d.invoices; var inv=invoices.filter(function(i){ return i.id===id; })[0]; if(inv) openSignView(inv); else toast('⚠ Invoice not found.','error'); }
        syncStatus('saved');
      })
      .catch(function(){ toast('⚠ Could not load invoice.','error'); });
  } else { loadInvoices(); }
}

window.addEventListener('load', function(){ initCanvas(); checkRoute(); });
</script>
